<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus Mode Active</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    .card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 40px 36px 32px;
      max-width: 440px;
      width: calc(100% - 48px);
      text-align: center;
      animation: fadeUp 0.3s ease-out forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Lock icon container */
    .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: #2a2a2a;
      border-radius: 14px;
      margin-bottom: 24px;
    }

    .icon-wrap svg {
      width: 26px;
      height: 26px;
      color: #fff;
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    p {
      font-size: 0.9rem;
      font-weight: 400;
      color: #888;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      background: #f0f0f0;
      color: #111;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s ease;
      margin-bottom: 16px;
    }

    .btn-back:hover {
      background: #fff;
    }

    .btn-back svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .hint {
      font-size: 0.8rem;
      color: #555;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Lock Icon -->
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <h1>Focus Mode Active</h1>
    <p>You're in DeepFocus mode. Solutions are temporarily locked to strengthen your problem-solving skills.</p>

    <button class="btn-back" id="btn-back">
      Back to Problem
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>

    <div class="hint">Solve it yourself first.</div>
  </div>

  <script src="blocked-overlay.js"></script>
</body>
</html>
