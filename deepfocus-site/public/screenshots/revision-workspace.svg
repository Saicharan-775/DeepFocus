  <circle cx="666" cy="265" r="4" fill="#00D09C"/>
  <text x="196" y="334" fill="#696975" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="4">REVISION WORKSPACE</text>
  <text x="196" y="384" fill="white" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="800">Merge Two Sorted Lists</text>
  <rect x="196" y="407" width="60" height="31" rx="15" fill="#00D09C" fill-opacity=".14"/>
  <text x="215" y="426" fill="#00D09C" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Easy</text>
  <rect x="263" y="407" width="143" height="31" rx="15" fill="white" fill-opacity=".055"/>
  <text x="281" y="426" fill="#A9A9B0" font-family="Inter, Arial, sans-serif" font-size="13">Arrays &amp; Matrices</text>
  <rect x="417" y="407" width="117" height="31" rx="15" fill="#8B7CFF" fill-opacity=".15"/>
