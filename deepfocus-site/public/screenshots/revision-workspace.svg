  <text x="196" y="539" fill="white" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Final implementation</text>
  <rect x="196" y="564" width="714" height="440" rx="8" fill="#08080b" stroke="white" stroke-opacity=".06"/>
  <text x="222" y="610" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="18">class Solution {</text>
  <text x="222" y="640" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="18">public:</text>
  <text x="260" y="670" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="18">ListNode* mergeTwoLists(ListNode* list1, ListNode* list2) {</text>
  <text x="300" y="700" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="18">ListNode* dummy = new ListNode(0);</text>
  <text x="300" y="730" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="18">ListNode* cur = dummy;</text>
  <text x="300" y="790" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="18">while (list1 &amp;&amp; list2) {</text>
  <text x="338" y="820" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="18">if (list1-&gt;val &gt; list2-&gt;val) {</text>
  <text x="376" y="850" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="18">cur-&gt;next = list2;</text>
  <text x="376" y="880" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="18">list2 = list2-&gt;next;</text>
  <rect x="952" y="234" width="897" height="60" fill="#111115"/>
  <text x="1002" y="271" fill="white" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Pseudocode</text>
  <text x="1108" y="270" fill="#696975" font-family="Inter, Arial, sans-serif" font-size="13">editorial reasoning</text>
  <rect x="1726" y="246" width="103" height="39" rx="7" fill="#8B7CFF" fill-opacity=".18"/>
  <text x="1761" y="270" fill="white" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">AI Draft</text>
  <line x1="1021.5" y1="294" x2="1021.5" y2="1040" stroke="white" stroke-opacity=".06"/>
  <g font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="white">
    <text x="1051" y="348">## Merge Two Sorted Lists Pseudocode</text>
    <text x="1051" y="420">1. Create a dummy node to simplify the merging process.</text>
    <text x="1051" y="454">2. Initialize a current pointer to the dummy node.</text>
    <text x="1051" y="488">3. **While both lists have nodes**:</text>
    <text x="1084" y="522">- Compare the current nodes' values.</text>
    <text x="1084" y="556">- Append the smaller value to the current node and move to the next</text>
    <text x="1051" y="590">node in that list.</text>
    <text x="1051" y="624">4. **Append the remaining nodes** from the non-empty list.</text>
    <text x="1051" y="658">5. Return the next node of the dummy node as the merged list head.</text>
  </g>
  <g fill="#2E3138" font-family="Inter, Arial, sans-serif" font-size="14">
    <text x="998" y="343">1</text><text x="998" y="377">2</text><text x="998" y="411">3</text><text x="998" y="445">4</text>
    <text x="998" y="479">5</text><text x="998" y="513">6</text><text x="998" y="547">7</text><text x="998" y="581">8</text>
    <text x="998" y="615">9</text><text x="998" y="649">10</text><text x="998" y="683">11</text><text x="998" y="717">12</text>
  </g>
